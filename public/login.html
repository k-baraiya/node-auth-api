<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-theme');
            }
        })();
    </script>
</head>
<body>

    <!-- Theme Toggle Button -->
    <button id="themeToggleBtn" onclick="toggleTheme()" class="theme-toggle-btn" aria-label="Toggle Theme">☀️</button>

    <div class="container">
        <h1>Welcome Back</h1>
        <p class="helper-text" style="margin-top: -12px; margin-bottom: 24px;">Please sign in to access your profile</p>

        <form onsubmit="login(event)">
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" name="loginEmail" placeholder="john@example.com" required />
            </div>
        
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" name="loginPassword" placeholder="••••••••" required />
            </div>
        
            <button type="submit" class="btn btn-primary" id="loginBtn">
                <span>Login</span>
            </button>
        </form>

        <p class="helper-text">
            Don't have an account? <a href="signup.html">Sign-Up</a>
        </p>
    </div>

    <!-- Toast container for notifications -->
    <div id="toast-container"></div>

    <script src="app.js"></script>
    <script>
        // Set body theme class and sync button icon on load
        document.body.classList.toggle('light-theme', document.documentElement.classList.contains('light-theme'));
        initTheme();
    </script>
</body>
</html>
